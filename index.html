<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5f5f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CIPHER">
<style>
  :root {
    --bg:#f5f5f7;
    --surface:#ffffff;
    --surface2:#f5f5f7;
    --border:#d2d2d7;
    --text:#1d1d1f;
    --text2:#6e6e73;
    --text3:#86868b;
    --blue:#0066cc;
    --blue-hover:#0077ed;
    --blue-light:rgba(0,102,204,0.08);
    --red:#ff3b30;
    --green:#34c759;
    --orange:#ff9500;
    --radius:12px;
    --radius-sm:8px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;padding:2.5rem 1rem 5rem;
    display:flex;flex-direction:column;align-items:center;
    -webkit-font-smoothing:antialiased;
  }

  /* HEADER */
  .hdr{
    width:100%;max-width:560px;
    display:flex;align-items:center;justify-content:center;
    padding-bottom:16px;margin-bottom:0;
  }
  canvas#dog{image-rendering:pixelated;width:64px;height:64px;}

  /* CARD */
  .card{
    width:100%;max-width:560px;
    background:var(--surface);
    border-radius:18px;
    box-shadow:0 2px 20px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
    overflow:hidden;
  }

  /* LOCK OVERLAY */
  #lock-overlay{
    display:none;position:fixed;inset:0;z-index:999;
    background:rgba(0,0,0,0.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    align-items:center;justify-content:center;flex-direction:column;gap:12px;
  }
  #lock-overlay.show{display:flex;}
  #lock-box{
    background:var(--surface);border-radius:20px;
    padding:2.2rem 2.8rem;text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    min-width:260px;
  }
  #lock-title{font-size:17px;font-weight:600;color:var(--red);margin-bottom:6px;letter-spacing:-.01em;}
  #lock-timer{font-size:36px;font-weight:300;letter-spacing:-.02em;color:var(--text);margin:8px 0;}
  #lock-sub{font-size:12px;color:var(--text3);line-height:1.5;}

  /* TYPE TOGGLE */
  .type-toggle{
    display:flex;padding:10px;gap:6px;
    border-bottom:1px solid var(--border);
    background:var(--surface2);
  }
  .type-btn{
    flex:1;padding:9px 12px;
    font-family:inherit;font-size:13px;font-weight:500;
    border:1.5px solid transparent;background:transparent;color:var(--text2);cursor:pointer;
    border-radius:var(--radius-sm);transition:all .15s;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .type-btn.on{
    background:var(--surface);color:var(--text);
    border-color:var(--border);
    box-shadow:0 1px 4px rgba(0,0,0,.08);
  }
  .type-btn:hover:not(.on){background:rgba(0,0,0,.04);color:var(--text);}

  /* ACTION HINT */
  .action-hint{
    display:flex;align-items:center;gap:10px;
    padding:12px 20px;
    border-bottom:1px solid var(--border);
    min-height:48px;
  }
  .action-badge{
    font-size:11px;font-weight:600;letter-spacing:.04em;
    padding:3px 9px;border-radius:980px;
    flex-shrink:0;
  }
  .action-badge.enc{background:rgba(0,102,204,.1);color:var(--blue);}
  .action-badge.dec{background:rgba(52,199,89,.12);color:#1a7a33;}
  .action-badge.idle{background:var(--border);color:var(--text3);}
  .action-desc{font-size:12px;color:var(--text3);line-height:1.4;}

  /* BODY */
  .body{padding:20px;}
  .field{margin-bottom:16px;}
  .lbl{
    font-size:12px;font-weight:500;
    color:var(--text2);margin-bottom:6px;
    display:block;
  }

  textarea,input.ipt{
    width:100%;font-family:inherit;
    font-size:14px;color:var(--text);background:var(--surface2);
    border:1.5px solid var(--border);border-radius:var(--radius-sm);
    padding:10px 13px;outline:none;
    line-height:1.6;transition:border-color .15s,box-shadow .15s;
  }
  textarea{resize:vertical;min-height:76px;}
  textarea:focus,input.ipt:focus{
    border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(0,102,204,.12);
    background:var(--surface);
  }
  textarea::placeholder,input.ipt::placeholder{color:var(--text3);}

  /* plaintext */
  .pt-field{position:relative;}
  .pt-field textarea{min-height:44px;}
  .pt-hint{display:none;}

  textarea.ro{
    background:var(--surface2);cursor:default;
    word-break:break-all;min-height:60px;color:var(--text2);resize:none;
  }
  textarea#pout{
    min-height:44px;max-height:44px;overflow:auto;
    background:var(--surface2);resize:none;word-break:break-all;
  }
  textarea#cout,textarea#cin{
    min-height:44px;max-height:44px;overflow:auto;resize:none;
    word-break:break-all;
  }
  .cipher-wrap{position:relative;}
  .cipher-mask{
    position:absolute;inset:0;pointer-events:none;
    font-family:inherit;font-size:14px;
    padding:10px 13px;line-height:1.6;
    color:var(--text);background:var(--surface2);
    border:1.5px solid var(--border);border-radius:var(--radius-sm);
    word-break:break-all;overflow:hidden;white-space:pre-wrap;
  }
  .cipher-mask.ro-mask{background:var(--surface2);}
  textarea#cout{color:transparent;background:var(--surface2);caret-color:transparent;}
  textarea#cin{color:transparent;background:var(--surface2);caret-color:var(--text);}

  /* STRENGTH */
  .strength-wrap{margin-top:6px;display:flex;gap:6px;align-items:center;}
  .strength-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
  .strength-fill{height:100%;width:0%;transition:width .3s,background .3s;border-radius:2px;}
  .strength-label{font-size:11px;color:var(--text3);min-width:46px;text-align:right;font-weight:500;}

  /* DROPZONE */
  .dropzone{
    width:100%;border:1.5px dashed var(--border);border-radius:var(--radius);
    background:var(--surface2);padding:1.6rem 1rem;
    text-align:center;cursor:pointer;transition:background .15s,border-color .15s;position:relative;
  }
  .dropzone:hover,.dropzone.drag{background:var(--blue-light);border-color:var(--blue);}
  .dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .dz-label{font-size:12px;color:var(--text2);}
  .dz-icon{font-size:22px;margin-bottom:6px;}
  .dz-file{font-size:13px;color:var(--blue);font-weight:500;margin-top:6px;}

  /* FILE RESULT */
  .file-result{
    border-radius:var(--radius-sm);padding:10px 14px;
    background:rgba(52,199,89,.1);border:1px solid rgba(52,199,89,.3);
    font-size:12px;color:var(--text);display:none;margin-top:4px;
  }
  .file-result.show{display:block;}
  .file-result b{color:var(--text);}

  /* BUTTON ROW */
  .brow{display:flex;gap:8px;margin-bottom:16px;}
  button.btn{
    font-family:inherit;font-size:14px;font-weight:500;
    padding:10px 20px;border:none;border-radius:980px;
    background:var(--surface2);color:var(--text);cursor:pointer;
    transition:background .15s,transform .1s;border:1.5px solid var(--border);
  }
  button.btn:hover{background:#e8e8ed;}
  button.btn:active{transform:scale(.97);}
  button.btn.inv{
    background:var(--blue);color:#fff;border-color:transparent;
  }
  button.btn.inv:hover{background:var(--blue-hover);}

  /* COPY BUTTON */
  button.btn-copy{
    font-family:inherit;font-size:12px;font-weight:500;
    padding:6px 14px;border:1.5px solid var(--border);border-radius:980px;
    background:var(--surface2);color:var(--text2);cursor:pointer;
    transition:background .15s,color .15s;
  }
  button.btn-copy:hover{background:var(--blue-light);color:var(--blue);border-color:var(--blue);}

  /* STATUS BAR */
  #sb{min-height:24px;margin-bottom:12px;cursor:default;}
  .bar{
    font-size:12px;font-weight:500;
    padding:7px 13px;border-radius:var(--radius-sm);
    display:inline-flex;align-items:center;gap:6px;
  }
  .ok{background:rgba(52,199,89,.12);color:#1a7a33;border:1px solid rgba(52,199,89,.25);}
  .ok::before{content:'✓  ';}

  /* PROGRESS */
  .prog-wrap{display:none;margin-bottom:12px;border-radius:4px;height:4px;background:var(--border);overflow:hidden;}
  .prog-wrap.show{display:block;}
  .prog-fill{height:100%;width:0%;background:var(--blue);transition:width .2s;border-radius:4px;}

  /* SECTION DIVIDER */
  .sec-divider{
    height:1px;background:var(--border);margin:0 -20px 16px;
  }
</style>
</head>
<body>

<div id="lock-overlay">
  <div id="lock-box">
    <div id="lock-title">Access Locked</div>
    <div id="lock-timer">10:00</div>
    <div id="lock-sub">Too many failed attempts — please wait</div>
  </div>
</div>

<div class="hdr">
  <canvas id="dog" width="24" height="24"></canvas>
</div>

<div class="card">

  <!-- 第一層：TEXT / FILE 切換 -->
  <div class="type-toggle">
    <button class="type-btn on" id="m-text" onclick="swMode('text')">文字</button>
    <button class="type-btn" id="m-file" onclick="swMode('file')">檔案</button>
  </div>

  <!-- 自動偵測狀態列 -->
  <div class="action-hint" id="action-hint">
    <span class="action-badge idle" id="action-badge">等待輸入</span>
    <span class="action-desc" id="action-desc">貼入密文會自動切換為解密模式</span>
  </div>

  <div class="body">
    <div id="sb"></div>
    <div class="prog-wrap" id="prog"><div class="prog-fill" id="prog-fill"></div></div>

    <!-- TEXT MODE -->
    <div id="mode-text">
      <div class="field">
        <div class="lbl">密碼</div>
        <input class="ipt" type="password" id="pw-unified" placeholder="" oninput="updateStrength(this.value,'sbar','slbl')">
        <div class="strength-wrap">
          <div class="strength-bar"><div class="strength-fill" id="sbar"></div></div>
          <div class="strength-label" id="slbl">—</div>
        </div>
      </div>
      <div class="field">
        <div class="lbl" id="input-lbl">輸入文字</div>
        <div class="pt-field">
          <textarea id="unified-input" placeholder="" oninput="detectMode(this.value)"></textarea>
        </div>
      </div>
      <div class="brow">
        <button class="btn inv" id="main-action-btn" onclick="doUnified()">加密</button>
        <button class="btn" onclick="clearUnified()">清除</button>
      </div>
      <div class="field" id="output-field" style="display:none">
        <div class="lbl" id="output-lbl">加密結果</div>
        <div class="cipher-wrap">
          <textarea class="ro" id="unified-output" readonly placeholder=""></textarea>
          <div class="cipher-mask ro-mask" id="cout-mask"></div>
        </div>
        <div style="margin-top:7px;display:flex;gap:8px;align-items:center;">
          <button class="btn-copy" onclick="cpTA('unified-output')">複製</button>
        </div>
      </div>

      <input type="hidden" id="pw-enc">
      <input type="hidden" id="pw-dec">
      <textarea id="pt" style="display:none"></textarea>
      <textarea id="cout" style="display:none"></textarea>
      <textarea id="cin" style="display:none"></textarea>
      <textarea id="pout" style="display:none"></textarea>
    </div>

    <!-- FILE MODE -->
    <div id="mode-file" style="display:none">
      <div class="field">
        <div class="lbl">密碼</div>
        <input class="ipt" type="password" id="fpw-unified" placeholder="" oninput="updateStrength(this.value,'sbar2','slbl2')">
        <div class="strength-wrap">
          <div class="strength-bar"><div class="strength-fill" id="sbar2"></div></div>
          <div class="strength-label" id="slbl2">—</div>
        </div>
      </div>
      <div class="field">
        <div class="lbl" id="file-input-lbl">選擇檔案</div>
        <div class="dropzone" id="dz-unified"
          ondragover="dzOver(event,'dz-unified')" ondragleave="dzOut('dz-unified')" ondrop="dzDropUnified(event)">
          <input type="file" id="file-unified" onchange="fileSelectedUnified()">
          <div class="dz-label" id="dz-label-text">拖曳或點擊選擇檔案<br><span style="color:var(--text3);font-size:11px">.enc 檔案會自動切換為解密模式</span></div>
          <div class="dz-file" id="fname-unified"></div>
        </div>
      </div>
      <div class="brow">
        <button class="btn inv" id="file-action-btn" onclick="doFileUnified()">加密檔案</button>
        <button class="btn" onclick="clearFileUnified()">清除</button>
      </div>
      <div class="file-result" id="fenc-result">
        已加密：<b id="fenc-name"></b>
      </div>
      <div class="file-result" id="fdec-result">
        已解密：<b id="fdec-name"></b>
      </div>
      <div class="file-result" id="fdec-err"></div>

      <input type="hidden" id="fpw-enc">
      <input type="hidden" id="fpw-dec">
      <div style="display:none">
        <input type="file" id="file-enc">
        <input type="file" id="file-dec">
        <span id="fname-enc"></span>
        <span id="fname-dec"></span>
      </div>
    </div>
  </div>
</div>

<script>
// ── PIXEL APPLE-STYLE LAPTOP ──
(function(){
  const c=document.getElementById('dog'),ctx=c.getContext('2d');
  const B='#3d3b38',S='#b0a89e',D='#8c7a6e',L='#c8d4c0',_=null;

  const p=[
    _,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,
    _,_,_,_,_,B,B,B,B,B,B,B,B,B,B,B,B,B,_,_,_,_,_,_,
    _,_,_,_,B,S,S,S,S,S,S,S,S,S,S,S,S,S,B,_,_,_,_,_,
    _,_,_,B,S,L,L,L,L,L,L,L,L,L,L,L,L,L,S,B,_,_,_,_,
    _,_,_,B,S,L,L,L,L,L,L,L,L,L,L,L,L,L,S,B,_,_,_,_,
    _,_,_,B,S,L,L,L,L,L,L,L,L,L,L,L,L,L,S,B,_,_,_,_,
    _,_,_,B,S,L,L,L,L,L,B,B,L,L,L,L,L,L,S,B,_,_,_,_,
    _,_,_,B,S,L,L,L,L,B,B,B,B,L,L,L,L,L,S,B,_,_,_,_,
    _,_,_,B,S,L,L,L,L,L,B,B,L,L,L,L,L,L,S,B,_,_,_,_,
    _,_,_,_,B,S,S,S,S,S,S,S,S,S,S,S,S,S,B,_,_,_,_,_,
    _,_,_,_,_,B,B,B,B,B,B,B,B,B,B,B,B,B,_,_,_,_,_,_,
    _,_,_,_,_,_,_,_,B,B,B,B,B,B,_,_,_,_,_,_,_,_,_,_,
    _,_,_,_,B,B,B,B,B,B,B,B,B,B,B,B,B,B,B,_,_,_,_,_,
    _,_,_,B,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,B,_,_,_,_,
    _,_,B,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,B,_,_,_,
    _,B,B,B,B,B,B,B,B,B,B,B,B,B,B,B,B,B,B,B,B,B,_,_,
    _,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,
    _,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,
    _,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,
    _,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,
    _,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,
    _,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,
    _,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,
    _,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_
  ];

  for(let i=0;i<p.length;i++){
    if(!p[i]) continue;
    ctx.fillStyle=p[i];
    ctx.fillRect(i%24,Math.floor(i/24),1,1);
  }

  // breathing screen glow
  let bright=true;
  setInterval(()=>{
    bright=!bright;
    ctx.fillStyle=bright ? L : '#a8b8a0';
    for(let y=3;y<=8;y++){
      for(let x=5;x<=17;x++){
        if(!(y>=6 && y<=8 && x>=9 && x<=12)){
          ctx.fillRect(x,y,1,1);
        }
      }
    }
  },700);
})();

// ── STATE ──
let currentMode='text', unifiedFile=null, fileIsEnc=false, _clearTimer=null;
// 保留舊名稱供底層函式使用
let encFile=null, decFile=null;

// ── LOCK STATE ──
let failCount=0, lockUntil=0, lockInterval=null;

function isLocked(){return Date.now()<lockUntil;}

function recordFail(){
  if(isLocked())return;
  failCount++;
  if(failCount>=3){
    lockUntil=Date.now()+10*60*1000;
    failCount=0;
    showLock();
  } else {
    const left=3-failCount;
    stat(`Wrong password — ${left} attempt${left>1?'s':''} remaining`,'ok');
  }
}

function showLock(){
  const overlay=document.getElementById('lock-overlay');
  overlay.classList.add('show');
  updateLockTimer();
  lockInterval=setInterval(()=>{
    if(!isLocked()){
      overlay.classList.remove('show');
      clearInterval(lockInterval);lockInterval=null;
      stat('Lock released','ok');
    } else { updateLockTimer(); }
  },1000);
}

function updateLockTimer(){
  const rem=Math.max(0,Math.ceil((lockUntil-Date.now())/1000));
  const m=String(Math.floor(rem/60)).padStart(2,'0');
  const s=String(rem%60).padStart(2,'0');
  document.getElementById('lock-timer').textContent=`${m}:${s}`;
}

// ── HELPERS ──
function b2h(buf){return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function h2b(hex){
  hex = hex.replace(/\s+/g,'');
  if(hex.length%2)throw new Error('INVALID HEX');
  if(!/^[0-9a-fA-F]+$/.test(hex)) throw new Error('INVALID HEX');
  const a=new Uint8Array(hex.length/2);
  for(let i=0;i<hex.length;i+=2){
    const v=parseInt(hex.slice(i,i+2),16);
    if(Number.isNaN(v)) throw new Error('INVALID HEX');
    a[i/2]=v;
  }
  return a.buffer;
}
function concatBufs(...bufs){
  const total=bufs.reduce((s,b)=>s+b.byteLength,0);
  const out=new Uint8Array(total);let off=0;
  bufs.forEach(b=>{out.set(new Uint8Array(b),off);off+=b.byteLength;});
  return out.buffer;
}

// ── PBKDF2 ──
async function deriveKey(password,saltBuf){
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:saltBuf,iterations:210000,hash:'SHA-256'},
    base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']
  );
}

// ── STRENGTH ──
function updateStrength(pw,barId,lblId){
  const bar=document.getElementById(barId),lbl=document.getElementById(lblId);
  let s=0;
  if(pw.length>=8)s++;if(pw.length>=16)s++;
  if(/[0-9]/.test(pw)&&/[a-zA-Z]/.test(pw))s++;
  if(/[^a-zA-Z0-9]/.test(pw)||pw.length>=24)s++;
  const L=[
    {w:'0%',c:'var(--border)',t:'—'},{w:'25%',c:'var(--red)',t:'Weak'},
    {w:'50%',c:'var(--orange)',t:'Fair'},{w:'75%',c:'#a0c040',t:'Good'},
    {w:'100%',c:'var(--green)',t:'Strong'}
  ];
  bar.style.width=L[s].w;bar.style.background=L[s].c;lbl.textContent=L[s].t;
}

// ── UI MODE ──
function swMode(m){
  currentMode=m;
  document.getElementById('mode-text').style.display=m==='text'?'':'none';
  document.getElementById('mode-file').style.display=m==='file'?'':'none';
  document.getElementById('m-text').className='type-btn'+(m==='text'?' on':'');
  document.getElementById('m-file').className='type-btn'+(m==='file'?' on':'');
  // 重置 hint
  if(m==='text') setActionHint('idle','等待輸入','貼入密文會自動切換為解密模式');
  else setActionHint('idle','等待選擇','選擇 .enc 檔案會自動切換為解密模式');
}

function setActionHint(type, badge, desc){
  const b=document.getElementById('action-badge');
  const d=document.getElementById('action-desc');
  b.className='action-badge '+type;
  b.textContent=badge;
  d.textContent=desc;
}

// ── 文字模式自動偵測 ──
// 密文特徵：純 hex 字串，長度 >= 80
function looksLikeCiphertext(val){
  const v=val.replace(/\s+/g,'');
  return v.length>=80 && /^[0-9a-fA-F]+$/.test(v);
}

let textIsDecMode=false;
function detectMode(val){
  const wasDecMode=textIsDecMode;
  textIsDecMode=looksLikeCiphertext(val);

  const btn=document.getElementById('main-action-btn');
  const inputLbl=document.getElementById('input-lbl');
  const outputField=document.getElementById('output-field');

  if(textIsDecMode){
    btn.textContent='解密';
    btn.style.background='var(--green)';
    inputLbl.textContent='密文';

async function doUnified(){
  const pw=document.getElementById('pw-unified').value;
  const input=document.getElementById('unified-input').value;
  if(!pw){stat('請輸入密碼','ok');return;}
  if(!input.trim()){stat('請輸入文字','ok');return;}

    if(ciph.length<80){outputTA.value='密文太短';outputTA.style.color=var_red();outputField.style.display='';return;}
    try{
      const salt=new Uint8Array(h2b(ciph.slice(0,32)));
      const iv=new Uint8Array(h2b(ciph.slice(32,56)));
      const ct=h2b(ciph.slice(56));
      const key=await deriveKey(pw,salt);
      const pl=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);

      outputField.style.display='';
      updateCipherMask('unified-output','cout-mask',true);

      outputTA.style.color=var_red();

    }
  } else {
    // 加密
    try{
      const salt=crypto.getRandomValues(new Uint8Array(16));
      const iv=crypto.getRandomValues(new Uint8Array(12));
      const key=await deriveKey(pw,salt);
      const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(input));

// ── STREAMING CONFIG ──
const CHUNK_SIZE = 8 * 1024 * 1024;

async function deriveBits(password,saltBuf){
  const base=await crypto.subtle.importKey(
    'raw',
    new TextEncoder().encode(password),
    {name:'PBKDF2'},
    false,
    ['deriveBits']
  );

  return crypto.subtle.deriveBits(
    {name:'PBKDF2',salt:saltBuf,iterations:210000,hash:'SHA-256'},
    base,
    256
  );
}

async function importAesKey(rawKey){
  return crypto.subtle.importKey(
    'raw',
    rawKey,
    {name:'AES-GCM'},
    false,
    ['encrypt','decrypt']
  );
}

function u32(n){
  return new Uint32Array([n]).buffer;
}

function readU32(arr){
  return new Uint32Array(arr.buffer.slice(arr.byteOffset, arr.byteOffset + 4))[0];
}

async function downloadBuf(buf,filename,mimeType){
  mimeType=mimeType||'application/octet-stream';
  const blob=new Blob([buf],{type:mimeType});

  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  const isAndroid=/Android/.test(navigator.userAgent);

  // iOS: Web Share API is the only reliable way to save files
  if(isIOS){
    // Web Share API with files — supported iOS 15+
    if(navigator.canShare && navigator.share){
      const file=new File([blob],filename,{type:mimeType});
      if(navigator.canShare({files:[file]})){
        try{
          await navigator.share({files:[file],title:filename});
          return;
        }catch(e){
          // User cancelled share — not an error
          if(e.name==='AbortError') return;
        }
      }
    }
    // Fallback: open blob in new tab, user long-presses to save
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    stat('Long-press the file to save','ok');
    setTimeout(()=>URL.revokeObjectURL(url),60000);
    return;
  }

  // Android: try Web Share API first, fallback to anchor download
  if(isAndroid && navigator.canShare && navigator.share){
    const file=new File([blob],filename,{type:mimeType});
    if(navigator.canShare({files:[file]})){
      try{
        await navigator.share({files:[file],title:filename});
        return;
      }catch(e){
        if(e.name==='AbortError') return;
      }
    }
  }

  // Desktop / fallback
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

const MAGIC=new Uint8Array([0xAE,0x53,0x47,0x01]);

// ── EXIF STRIP ──
// 只處理 JPEG（SOI = FF D8）。
// JPEG 由數個 segment 組成，每段格式為：marker(2) + length(2) + data
// APP1（FF E1）通常是 EXIF，APP2~APP15 也可能含元數據，一律移除。
// 保留 SOI、DQT、SOF、DHT、SOS 及之後的影像資料。
function stripExif(arrayBuffer) {
  const data = new DataView(arrayBuffer);

  // 確認是 JPEG（FF D8）
  if (data.byteLength < 4 || data.getUint8(0) !== 0xFF || data.getUint8(1) !== 0xD8) {
    return arrayBuffer; // 非 JPEG，原樣返回
  }

  const out = [new Uint8Array([0xFF, 0xD8])]; // 保留 SOI
  let offset = 2;

  while (offset < data.byteLength - 1) {
    // 找下一個 marker（必須是 FF 開頭）
    if (data.getUint8(offset) !== 0xFF) break;

    const marker = data.getUint8(offset + 1);

    // SOS（FF DA）開始後是壓縮影像資料，直接取到結尾
    if (marker === 0xDA) {
      out.push(new Uint8Array(arrayBuffer, offset));
      break;
    }

    // EOI（FF D9）
    if (marker === 0xD9) {
      out.push(new Uint8Array([0xFF, 0xD9]));
      break;
    }

    // standalone markers（無 length 欄位）
    if (marker === 0xD8 || (marker >= 0xD0 && marker <= 0xD7)) {
      out.push(new Uint8Array([0xFF, marker]));
      offset += 2;
      continue;
    }

    if (offset + 3 >= data.byteLength) break;
    const segLen = data.getUint16(offset + 2); // includes the 2-byte length field itself
    const segEnd = offset + 2 + segLen;

    // APP1~APP15（FF E1 ~ FF EF）：EXIF / XMP / ICC 等元數據，跳過
    if (marker >= 0xE1 && marker <= 0xEF) {
      offset = segEnd;
      continue;
    }

    // 其他 segment 保留（APP0/JFIF、DQT、SOF、DHT 等）
    out.push(new Uint8Array(arrayBuffer, offset, 2 + segLen));
    offset = segEnd;
  }

  // 合併所有保留的 segment
  const total = out.reduce((s, a) => s + a.byteLength, 0);
  const result = new Uint8Array(total);
  let pos = 0;
  for (const chunk of out) { result.set(chunk, pos); pos += chunk.byteLength; }
  return result.buffer;
}

async function doFileEnc(){
  const pw=document.getElementById('fpw-enc').value || document.getElementById('fpw-unified').value;

  if(!pw){stat('No password','ok');return;}
  if(!encFile){stat('No file selected','ok');return;}

  try{
    setProgBar(5);

    const salt=crypto.getRandomValues(new Uint8Array(16));
    const rawKey=await deriveBits(pw,salt);
    const aesKey=await importAesKey(rawKey);

    const nameBytes=new TextEncoder().encode(encFile.name);

    const parts=[];

    parts.push(MAGIC.buffer);

    const nameLenBuf=new Uint16Array([nameBytes.length]);
    parts.push(nameLenBuf.buffer);

    parts.push(nameBytes.buffer);

    parts.push(salt.buffer);

    // 判斷是否為 JPEG，是的話先讀整個檔案 strip EXIF，再分 chunk 加密
    const isJpeg = /\.(jpe?g)$/i.test(encFile.name) ||
                   encFile.type === 'image/jpeg';
    let strippedBuf = null;

    if (isJpeg) {
      stat('Removing EXIF metadata…', 'ok');
      const raw = await encFile.arrayBuffer();
      strippedBuf = stripExif(raw);
    }

    const sourceSize = strippedBuf ? strippedBuf.byteLength : encFile.size;
    const totalChunks = Math.ceil(sourceSize / CHUNK_SIZE);

    parts.push(u32(totalChunks));

    for(let i=0;i<totalChunks;i++){

      const start=i*CHUNK_SIZE;

      // JPEG 用 strip 後的 buffer 切 chunk；其他格式直接從 File 讀
      let chunk;
      if (strippedBuf) {
        chunk = strippedBuf.slice(start, Math.min(start + CHUNK_SIZE, strippedBuf.byteLength));
      } else {
        chunk = await encFile.slice(start, Math.min(start + CHUNK_SIZE, encFile.size)).arrayBuffer();
      }

      const iv=crypto.getRandomValues(new Uint8Array(12));

      const encrypted=await crypto.subtle.encrypt(
        {name:'AES-GCM',iv},
        aesKey,
        chunk
      );

      parts.push(iv.buffer);
      parts.push(u32(encrypted.byteLength));
      parts.push(encrypted);

      const pct=Math.floor(((i+1)/totalChunks)*90);
      setProgBar(Math.max(10,pct));
    }

    const finalBuf=concatBufs(...parts);

    await downloadBuf(
      finalBuf,
      encFile.name + '.enc',
      'application/octet-stream'
    );

    setProgBar(100);
    setTimeout(()=>setProgBar(null),1000);

    document.getElementById('fenc-name').textContent=encFile.name+'.enc';
    document.getElementById('fenc-result').classList.add('show');

    stat('Encryption complete','ok');
    startClearCountdown();

  }catch(e){
    console.error(e);
    setProgBar(null);
    stat('Encryption failed','ok');
  }
}



async function doFileDec(){

  if(isLocked()){showLock();return;}
  const pw=document.getElementById('fpw-dec').value || document.getElementById('fpw-unified').value;

  const errEl=document.getElementById('fdec-err');

  errEl.classList.remove('show');
  errEl.textContent='';

  document.getElementById('fdec-result').classList.remove('show');

  if(!pw){showFileErr('No password');return;}
  if(!decFile){showFileErr('No file selected');return;}

  try{

    setProgBar(5);

    const raw=new Uint8Array(await decFile.arrayBuffer());

    if(raw[0]!==0xAE||raw[1]!==0x53||raw[2]!==0x47||raw[3]!==0x01){
      setProgBar(null);
      showFileErr('Invalid encrypted file');
      return;
    }

    let off=4;

    const nameLen=new Uint16Array(
      raw.slice(off,off+2).buffer
    )[0];

    off+=2;

    const origName=new TextDecoder().decode(
      raw.slice(off,off+nameLen)
    );

    off+=nameLen;

    const salt=raw.slice(off,off+16);

    off+=16;

    const totalChunks=readU32(raw.slice(off,off+4));

    off+=4;

    const rawKey=await deriveBits(pw,salt);

    const aesKey=await importAesKey(rawKey);

    const plainParts=[];

    for(let i=0;i<totalChunks;i++){

      const iv=raw.slice(off,off+12);

      off+=12;

      const encLen=readU32(raw.slice(off,off+4));

      off+=4;

      const encChunk=raw.slice(off,off+encLen).buffer;

      off+=encLen;

      const plain=await crypto.subtle.decrypt(
        {name:'AES-GCM',iv},
        aesKey,
        encChunk
      );

      plainParts.push(plain);

      const pct=Math.floor(((i+1)/totalChunks)*90);

      setProgBar(Math.max(10,pct));
    }

    const finalBuf=concatBufs(...plainParts);

    await downloadBuf(
      finalBuf,
      origName,
      'application/octet-stream'
    );

    setProgBar(100);

    setTimeout(()=>setProgBar(null),1000);

    document.getElementById('fdec-name').textContent=origName;

    document.getElementById('fdec-result').classList.add('show');

    failCount=0;
    stat('Decryption complete','ok');

    startClearCountdown();

  }catch(e){

    console.error(e);

    setProgBar(null);

    recordFail();
    showFileErr(
      'Decryption failed — wrong password or corrupted file'
    );
  }
}

  const el=document.getElementById('fdec-err');
  el.textContent=msg;el.classList.add('show');
  el.style.color=var_red();el.style.whiteSpace='pre';
}

// ── COPY / CLEAR ──
function cpTA(id){
  const el=document.getElementById(id);
  const text=el.value.trim();
  if(!text){stat('Nothing to copy','ok');return;}
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(()=>stat('Copied','ok')).catch(()=>fallbackCopy(text));
  } else{fallbackCopy(text);}
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');stat('Copied','ok');}catch(e){stat('Copy failed — select manually','ok');}
  document.body.removeChild(ta);
}

function updateCipherMask(taId,maskId,isRo){
  const ta=document.getElementById(taId);
  const mask=document.getElementById(maskId);
  if(!ta||!mask){return;}
  const val=ta.value;
  if(!val){mask.textContent='';return;}
  mask.textContent='*'.repeat(Math.min(val.length,300));
}
